<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>𝐆𝐊 𝐂𝐇𝐀𝐋𝐋𝐄𝐍𝐆𝐄</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>
        🧠 𝐆𝐊 𝐂𝐇𝐀𝐋𝐋𝐄𝐍𝐆𝐄 🧠
    </h1>

    <p>
        🔥 <b>𝐏𝐀𝐆𝐄 {{ page }} / {{ total_pages }}</b> 🔥
    </p>


    <form method="POST">

    {% for q in questions %}

        <div class="question">

            <h3>
                {{ (page-1)*10 + loop.index }}. <b>{{ q.question }}</b>
            </h3>


            {% for option in q.options %}

                <label class="option">

                    <input 
                        type="radio"
                        name="q{{ (page-1)*10 + loop.index0 }}"
                        value="{{ option }}"
                        required
                    >

                    <b>{{ option }}</b>

                </label>


            {% endfor %}

        </div>


    {% endfor %}



    {% if page < total_pages %}

        <button type="button" onclick="window.location.href='/quiz?page={{ page + 1 }}'">
            ➡️ <b>NEXT</b>
        </button>

    {% else %}

        <button type="submit">
            🚀 <b>SUBMIT QUIZ</b> 🚀
        </button>

    {% endif %}



    </form>

</div>

</body>

</html>
